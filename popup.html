<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <title>Checkbox Manager</title>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --border-focus: #6366f1;
      --accent: #6366f1;
      --text: #0f172a;
      --muted: #64748b;
      --success-bg: #f0fdf4;
      --success-border: #bbf7d0;
      --success-text: #16a34a;
      --danger-bg: #fef2f2;
      --danger-border: #fecaca;
      --danger-text: #dc2626;
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      width: 300px;
      background: var(--bg);
      color: var(--text);
    }

    #heading {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 13px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    #heading svg {
      color: var(--accent);
      flex-shrink: 0;
    }

    #heading h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .content {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .fields {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    label {
      font-size: 10.5px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="text"]::placeholder {
      color: var(--muted);
      opacity: 0.5;
    }

    input[type="text"]:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
    }

    .divider {
      height: 1px;
      background: var(--border);
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .action-row {
      display: flex;
      gap: 8px;
    }

    button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 12px;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }

    button:active {
      opacity: 0.8;
    }

    #checkAll {
      flex: 1;
      background: var(--success-bg);
      color: var(--success-text);
      border: 1px solid var(--success-border);
    }

    #checkAll:hover {
      background: rgba(74, 222, 128, 0.2);
    }

    #uncheckAll {
      flex: 1;
      background: var(--danger-bg);
      color: var(--danger-text);
      border: 1px solid var(--danger-border);
    }

    #uncheckAll:hover {
      background: rgba(248, 113, 113, 0.2);
    }

    #clearButton {
      width: 100%;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    #clearButton:hover {
      background: var(--surface);
      color: var(--text);
    }
  </style>
</head>

<body>
  <div id="heading">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9 11 12 14 22 4"></polyline>
      <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
    </svg>
    <h3>Checkbox Manager</h3>
  </div>

  <div class="content">
    <form id="criteria-form">
      <div class="fields">
        <div class="field">
          <label for="startsWith">Starts With</label>
          <input type="text" id="startsWith" placeholder="Leave blank for all" />
        </div>
        <div class="field">
          <label for="contains">Contains</label>
          <input type="text" id="contains" placeholder="Leave blank for all" />
        </div>
        <div class="field">
          <label for="doesNotInclude">Doesn't Include</label>
          <input type="text" id="doesNotInclude" placeholder="Leave blank for all" />
        </div>
      </div>
    </form>

    <div class="divider"></div>

    <div class="buttons">
      <div class="action-row">
        <button type="button" id="checkAll">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          Check All
        </button>
        <button type="button" id="uncheckAll">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
          Uncheck All
        </button>
      </div>
      <button type="reset" id="clearButton">Clear Form</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
